<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ceylanım & Ben ❤️ Sesli Pro</title>
    <style>
        body { margin: 0; font-family: Arial; touch-action: manipulation; overflow: hidden; background: #ffafbd; transition: background 1.5s; }
        #login { position: fixed; inset: 0; background: #ffafbd; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        .btn-group { display: flex; gap: 15px; }
        button { padding: 20px 40px; font-size: 22px; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; }
        #game-area { display: none; height: 100vh; flex-direction: column; }
        .screen-wrapper { position: relative; height: 50%; border-bottom: 2px solid white; }
        canvas { width: 100%; height: 100%; display: block; }
        .mic-btn { position: absolute; top: 15px; left: 15px; z-index: 1000; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.5); }
        .emoji-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        #floating-emoji { position: fixed; font-size: 80px; left: 50%; transform: translateX(-50%); bottom: 100px; opacity: 0; transition: 1s; z-index: 2000; pointer-events: none; }
        #hs-display { position: fixed; top: 15px; right: 15px; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="login">
        <h1 style="color: white;">❤️ Tarafını Seç ❤️</h1>
        <div class="btn-group">
            <button onclick="join('Ceylanım')" style="color: #ff4d4d;">Ceylanım</button>
            <button onclick="join('Ben')" style="color: #4d94ff;">Ben</button>
        </div>
    </div>

    <div id="hs-display">Rekor: Yok</div>
    <div id="floating-emoji"></div>
    <div class="emoji-bar" id="emojiBar" style="display: none;">
        <button onclick="socket.emit('sendEmoji', '❤️')">❤️</button>
        <button onclick="socket.emit('sendEmoji', '😘')">😘</button>
        <button onclick="socket.emit('sendEmoji', '🔥')">🔥</button>
    </div>

    <div id="game-area">
        <div class="screen-wrapper">
            <button id="micTop" class="mic-btn" onclick="toggleMic()">🎤</button>
            <canvas id="canvasTop"></canvas>
        </div>
        <div class="screen-wrapper">
            <button id="micBottom" class="mic-btn" onclick="toggleMic()">🎤</button>
            <canvas id="canvasBottom"></canvas>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRole = null, localStream, peerConnection, micActive = true;
        const canvases = [document.getElementById('canvasTop'), document.getElementById('canvasBottom')];
        const ctxs = canvases.map(c => c.getContext('2d'));

        async function join(role) {
            myRole = role;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('emojiBar').style.display = 'flex';
            document.getElementById('micTop').style.display = role === 'Ceylanım' ? 'block' : 'none';
            document.getElementById('micBottom').style.display = role === 'Ben' ? 'block' : 'none';
            resize();
            socket.emit('join', role);
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                initVoice();
            } catch (e) { alert("Mikrofon izni gerekli!"); }
        }

        function initVoice() {
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:://google.com' }] });
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => { const a = new Audio(); a.srcObject = e.streams[0]; a.play(); };
            peerConnection.onicecandidate = e => e.candidate && socket.emit('signal', { candidate: e.candidate });
            if (myRole === 'Ben') {
                peerConnection.createOffer().then(o => { peerConnection.setLocalDescription(o); socket.emit('signal', { offer: o }); });
            }
            socket.on('signal', async d => {
                if (d.offer) { await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer)); const a = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(a); socket.emit('signal', { answer: a }); }
                else if (d.answer) await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
                else if (d.candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate));
            });
        }

        function toggleMic() {
            micActive = !micActive;
            localStream.getAudioTracks()[0].enabled = micActive;
            const btn = myRole === 'Ceylanım' ? document.getElementById('micTop') : document.getElementById('micBottom');
            btn.innerText = micActive ? "🎤" : "🔇";
        }

        function resize() { canvases.forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight/2; }); }
        window.onresize = resize;

        socket.on('showEmoji', d => {
            const el = document.getElementById('floating-emoji');
            el.innerText = d.emoji; el.style.opacity = "1"; el.style.bottom = "300px";
            setTimeout(() => { el.style.opacity = "0"; el.style.bottom = "100px"; }, 1500);
        });

        socket.on('highScoreUpdate', d => document.getElementById('hs-display').innerText = `Rekor: ${d.name} (${d.score})`);

        function drawHeart(ctx, x, y, size, color) {
            ctx.fillStyle = color; ctx.beginPath();
            ctx.moveTo(x, y + size/4); ctx.quadraticCurveTo(x, y, x + size/4, y);
            ctx.quadraticCurveTo(x + size/2, y, x + size/2, y + size/4);
            ctx.quadraticCurveTo(x + size/2, y, x + size*3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size/4);
            ctx.quadraticCurveTo(x + size, y + size/2, x + size/2, y + size*3/4);
            ctx.quadraticCurveTo(x, y + size/2, x, y + size/4); ctx.fill();
        }

        socket.on('gameState', d => {
            const cycle = Math.sin(d.frameCount * 0.005);
            document.body.style.background = cycle > 0 ? `rgb(255, ${175 + (cycle*40)}, ${189 + (cycle*40)})` : `rgb(${30 + (Math.abs(cycle)*40)}, 30, 60)`;
            ctxs.forEach((ctx, index) => {
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                d.pipes.forEach(p => { ctx.fillRect(p.x, 0, 50, p.top/2); ctx.fillRect(p.x, p.bottom/2, 50, ctx.canvas.height); });
                for (let id in d.players) {
                    let p = d.players[id];
                    if ((index === 0 && p.role === 'Ceylanım') || (index === 1 && p.role === 'Ben')) {
                        drawHeart(ctx, 100, p.y/2, 30, p.alive ? p.color : "#555");
                        ctx.fillStyle = "white"; ctx.font = "bold 22px Arial"; ctx.fillText(p.score, 110, (p.y/2) - 20);
                    }
                }
            });
        });

        window.addEventListener('touchstart', e => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); socket.emit('jump'); }}, {passive: false});
        window.addEventListener('keydown', e => { if(e.code === 'Space') socket.emit('jump'); });
    </script>
</body>
</html>
